name: Daily Publish

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Publish next folder
        run: |
          next=$(ls scheduled | sort | head -n 1)

          if [ -z "$next" ]; then
            echo "No folders left"
            exit 0
          fi

          mv "scheduled/$next" "./$next"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Publish $next"

          git push